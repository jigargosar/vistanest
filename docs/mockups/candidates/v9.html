<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VistaNest — Hierarchical Outliner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@300;400;500;600&family=Azeret+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0b0d;
    --bg-base: #0f1114;
    --bg-surface: #161920;
    --bg-elevated: #1c2029;
    --bg-hover: #222733;
    --bg-active: #2a3040;

    --border-faint: #1e2230;
    --border-subtle: #282d3c;
    --border-medium: #353c50;

    --text-primary: #c8ccd8;
    --text-secondary: #8a90a4;
    --text-tertiary: #5c6278;
    --text-ghost: #3e4458;

    --accent-amber: #d4a843;
    --accent-amber-dim: #a07e2f;
    --accent-amber-glow: rgba(212, 168, 67, 0.12);
    --accent-green: #5fad6e;
    --accent-green-dim: #3d7a48;
    --accent-green-glow: rgba(95, 173, 110, 0.10);
    --accent-red: #c75450;
    --accent-blue: #5b8dd9;
    --accent-blue-dim: #3d6aaa;

    --font-mono: 'IBM Plex Mono', 'JetBrains Mono', monospace;
    --font-display: 'Azeret Mono', 'IBM Plex Mono', monospace;

    --depth-0-left: 0px;
    --depth-1-left: 28px;
    --depth-2-left: 56px;
    --depth-3-left: 84px;
    --depth-4-left: 112px;

    --item-height: 34px;
    --scanline-opacity: 0.025;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-weight: 400;
    line-height: 1.5;
    overflow: hidden;
    height: 100vh;
    cursor: default;
  }

  /* === SCANLINE OVERLAY === */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 9999;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, var(--scanline-opacity)) 2px,
      rgba(0, 0, 0, var(--scanline-opacity)) 4px
    );
  }

  /* === NOISE TEXTURE === */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 9998;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  /* === LAYOUT === */
  .app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
  }

  /* === HEADER === */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 44px;
    background: var(--bg-base);
    border-bottom: 1px solid var(--border-faint);
    position: relative;
    z-index: 10;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      var(--accent-amber-dim) 20%,
      var(--accent-amber) 50%,
      var(--accent-amber-dim) 80%,
      transparent 100%
    );
    opacity: 0.3;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 22px;
    height: 22px;
    position: relative;
  }

  .logo-mark .nest-ring {
    position: absolute;
    border: 1.5px solid var(--accent-amber);
    border-radius: 2px;
    transform: rotate(45deg);
  }

  .logo-mark .nest-ring:nth-child(1) {
    width: 22px; height: 22px;
    top: 0; left: 0;
    opacity: 0.3;
  }
  .logo-mark .nest-ring:nth-child(2) {
    width: 14px; height: 14px;
    top: 4px; left: 4px;
    opacity: 0.6;
  }
  .logo-mark .nest-ring:nth-child(3) {
    width: 6px; height: 6px;
    top: 8px; left: 8px;
    opacity: 1;
    background: var(--accent-amber);
  }

  .logo-text {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-primary);
  }

  .logo-text span {
    color: var(--accent-amber);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-tertiary);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .header-btn:hover {
    color: var(--text-secondary);
    background: var(--bg-hover);
    border-color: var(--border-subtle);
  }

  .header-btn .kbd {
    font-size: 9px;
    padding: 1px 4px;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 2px;
    color: var(--text-ghost);
    font-family: var(--font-mono);
  }

  /* === BREADCRUMB === */
  .breadcrumb-bar {
    display: flex;
    align-items: center;
    padding: 0 20px;
    height: 32px;
    background: var(--bg-base);
    border-bottom: 1px solid var(--border-faint);
    font-size: 11px;
    gap: 4px;
  }

  .breadcrumb-item {
    color: var(--text-tertiary);
    cursor: pointer;
    transition: color 0.15s;
  }

  .breadcrumb-item:hover {
    color: var(--text-secondary);
  }

  .breadcrumb-sep {
    color: var(--text-ghost);
    font-size: 9px;
  }

  .breadcrumb-item.current {
    color: var(--text-secondary);
  }

  /* === MAIN CONTENT AREA === */
  .main {
    display: grid;
    grid-template-columns: 240px 1fr 260px;
    overflow: hidden;
  }

  /* === SIDEBAR (Lists) === */
  .sidebar {
    background: var(--bg-base);
    border-right: 1px solid var(--border-faint);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-ghost);
  }

  .sidebar-add {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1px solid var(--border-subtle);
    color: var(--text-ghost);
    border-radius: 3px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }

  .sidebar-add:hover {
    border-color: var(--accent-amber-dim);
    color: var(--accent-amber);
    background: var(--accent-amber-glow);
  }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 8px;
  }

  .list-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.12s ease;
    margin-bottom: 1px;
    position: relative;
  }

  .list-item:hover {
    background: var(--bg-hover);
  }

  .list-item.active {
    background: var(--bg-active);
  }

  .list-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 6px;
    bottom: 6px;
    width: 2px;
    background: var(--accent-amber);
    border-radius: 1px;
  }

  .list-icon {
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-ghost);
    font-size: 10px;
    flex-shrink: 0;
  }

  .list-item.active .list-icon {
    color: var(--accent-amber-dim);
  }

  .list-name {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .list-item.active .list-name {
    color: var(--text-primary);
  }

  .list-count {
    font-size: 10px;
    color: var(--text-ghost);
    min-width: 18px;
    text-align: right;
  }

  .sidebar-section-divider {
    height: 1px;
    background: var(--border-faint);
    margin: 8px 8px;
  }

  /* === OUTLINER PANE === */
  .outliner {
    overflow-y: auto;
    padding: 20px 0;
    position: relative;
    background: var(--bg-deep);
  }

  /* subtle vignette */
  .outliner::before {
    content: '';
    position: sticky;
    top: 0;
    display: block;
    height: 40px;
    margin-top: -40px;
    background: linear-gradient(to bottom, var(--bg-deep), transparent);
    pointer-events: none;
    z-index: 5;
  }

  .outline-list-title {
    padding: 0 32px 16px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .outline-list-title h1 {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: 0.02em;
  }

  .outline-list-title .item-count {
    font-size: 11px;
    color: var(--text-ghost);
  }

  /* === OUTLINE ITEMS === */
  .outline-item {
    position: relative;
    display: flex;
    align-items: flex-start;
    min-height: var(--item-height);
    padding: 3px 16px 3px 0;
    transition: background 0.1s ease;
    cursor: default;
  }

  .outline-item:hover {
    background: rgba(255,255,255,0.012);
  }

  .outline-item.focused {
    background: var(--accent-amber-glow);
  }

  .outline-item.focused::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--accent-amber);
    box-shadow: 0 0 8px rgba(212,168,67,0.3);
  }

  /* Focus cursor blink */
  .outline-item.focused .item-bullet::after {
    content: '';
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 14px;
    background: var(--accent-amber);
    animation: cursor-blink 1s ease-in-out infinite;
  }

  @keyframes cursor-blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  .outline-item.selected {
    background: var(--accent-blue-dim);
    background: rgba(91,141,217,0.08);
  }

  .outline-item.selected::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--accent-blue);
  }

  /* Depth indent guides */
  .outline-item .indent-guides {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 32px;
    pointer-events: none;
  }

  .indent-guide {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--border-faint);
  }

  .indent-guide:nth-child(1) { left: 0; }
  .indent-guide:nth-child(2) { left: 28px; }
  .indent-guide:nth-child(3) { left: 56px; }
  .indent-guide:nth-child(4) { left: 84px; }

  .outline-item.focused .indent-guide {
    background: var(--border-subtle);
  }

  /* Indent spacer */
  .item-indent {
    flex-shrink: 0;
    height: 100%;
  }

  .depth-0 .item-indent { width: 32px; }
  .depth-1 .item-indent { width: 60px; }
  .depth-2 .item-indent { width: 88px; }
  .depth-3 .item-indent { width: 116px; }
  .depth-4 .item-indent { width: 144px; }

  /* Toggle arrow */
  .item-toggle {
    width: 18px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--text-ghost);
    font-size: 8px;
    cursor: pointer;
    transition: color 0.15s, transform 0.2s ease;
    position: relative;
  }

  .item-toggle:hover {
    color: var(--text-secondary);
  }

  .item-toggle.expanded {
    transform: rotate(90deg);
  }

  .item-toggle.leaf {
    visibility: hidden;
  }

  /* Bullet */
  .item-bullet {
    width: 18px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }

  .bullet-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-ghost);
    transition: all 0.15s;
  }

  .outline-item:hover .bullet-dot {
    background: var(--text-tertiary);
  }

  .outline-item.focused .bullet-dot {
    background: var(--accent-amber);
    box-shadow: 0 0 6px rgba(212,168,67,0.4);
  }

  .outline-item.completed .bullet-dot {
    background: var(--accent-green-dim);
  }

  .has-children .bullet-dot {
    width: 6px;
    height: 6px;
    background: var(--text-tertiary);
  }

  /* Checkbox */
  .item-checkbox {
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--border-medium);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    margin-right: 6px;
    margin-top: 7px;
    flex-shrink: 0;
  }

  .item-checkbox:hover {
    border-color: var(--accent-green-dim);
  }

  .item-checkbox.checked {
    background: var(--accent-green-dim);
    border-color: var(--accent-green-dim);
  }

  .item-checkbox.checked::after {
    content: '';
    width: 8px;
    height: 5px;
    border-left: 1.5px solid var(--bg-deep);
    border-bottom: 1.5px solid var(--bg-deep);
    transform: rotate(-45deg) translateY(-1px);
  }

  /* Item text */
  .item-text {
    flex: 1;
    padding: 4px 0;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text-primary);
    min-width: 0;
  }

  .outline-item.completed .item-text {
    color: var(--text-tertiary);
    text-decoration: line-through;
    text-decoration-color: var(--text-ghost);
  }

  .item-text .tag {
    display: inline;
    color: var(--accent-amber-dim);
    font-size: 12px;
  }

  .item-text .link {
    color: var(--accent-blue);
    text-decoration: none;
    border-bottom: 1px solid rgba(91,141,217,0.3);
  }

  .item-text .note-marker {
    color: var(--text-ghost);
    font-size: 11px;
    margin-left: 4px;
  }

  /* Item note (collapsed) */
  .item-note-preview {
    font-size: 11px;
    color: var(--text-ghost);
    padding: 0 0 4px;
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-left: 36px;
  }

  /* Item meta / badges */
  .item-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-top: 6px;
    flex-shrink: 0;
  }

  .item-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
    font-family: var(--font-mono);
    letter-spacing: 0.03em;
  }

  .badge-priority {
    background: rgba(199,84,80,0.12);
    color: var(--accent-red);
    border: 1px solid rgba(199,84,80,0.2);
  }

  .badge-due {
    background: rgba(212,168,67,0.08);
    color: var(--accent-amber-dim);
    border: 1px solid rgba(212,168,67,0.15);
  }

  .badge-tag {
    background: rgba(91,141,217,0.08);
    color: var(--accent-blue-dim);
    border: 1px solid rgba(91,141,217,0.15);
  }

  .badge-count {
    background: var(--bg-surface);
    color: var(--text-ghost);
    border: 1px solid var(--border-subtle);
  }

  /* Collapsed children indicator */
  .collapsed-count {
    font-size: 10px;
    color: var(--text-ghost);
    padding: 2px 6px;
    background: var(--bg-surface);
    border: 1px solid var(--border-faint);
    border-radius: 2px;
    margin-left: 8px;
    cursor: pointer;
  }

  .collapsed-count:hover {
    border-color: var(--border-subtle);
    color: var(--text-tertiary);
  }

  /* === DETAILS PANEL === */
  .details-panel {
    background: var(--bg-base);
    border-left: 1px solid var(--border-faint);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .details-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border-faint);
  }

  .details-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-ghost);
    margin-bottom: 8px;
  }

  .details-item-text {
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.5;
  }

  .details-section {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-faint);
  }

  .details-field {
    margin-bottom: 10px;
  }

  .details-field:last-child {
    margin-bottom: 0;
  }

  .details-field-label {
    font-size: 10px;
    color: var(--text-ghost);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .details-field-value {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .details-field-value.editable {
    padding: 3px 6px;
    border: 1px solid transparent;
    border-radius: 2px;
    cursor: text;
    transition: all 0.15s;
  }

  .details-field-value.editable:hover {
    border-color: var(--border-subtle);
    background: var(--bg-surface);
  }

  .details-note {
    padding: 12px 16px;
    flex: 1;
  }

  .details-note-content {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .details-note-content .placeholder {
    color: var(--text-ghost);
    font-style: italic;
  }

  /* === STATUS BAR === */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 28px;
    background: var(--bg-base);
    border-top: 1px solid var(--border-faint);
    font-size: 10px;
    color: var(--text-ghost);
    position: relative;
    z-index: 10;
  }

  .status-left, .status-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-green);
    animation: pulse-green 3s ease-in-out infinite;
  }

  @keyframes pulse-green {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; box-shadow: 0 0 4px rgba(95,173,110,0.4); }
  }

  .status-mode {
    padding: 1px 6px;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 2px;
    color: var(--accent-amber-dim);
    letter-spacing: 0.05em;
  }

  /* === COMMAND PALETTE OVERLAY === */
  .command-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,6,8,0.7);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: center;
    padding-top: 120px;
    z-index: 100;
    animation: overlay-in 0.15s ease;
  }

  @keyframes overlay-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .command-palette {
    width: 520px;
    max-height: 380px;
    background: var(--bg-surface);
    border: 1px solid var(--border-medium);
    border-radius: 6px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 1px rgba(212,168,67,0.1);
    overflow: hidden;
    animation: palette-in 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes palette-in {
    from { opacity: 0; transform: translateY(-10px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .command-input-wrap {
    display: flex;
    align-items: center;
    padding: 0 14px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .command-prompt {
    color: var(--accent-amber);
    font-size: 14px;
    margin-right: 8px;
  }

  .command-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 12px 0;
    caret-color: var(--accent-amber);
  }

  .command-input::placeholder {
    color: var(--text-ghost);
  }

  .command-results {
    padding: 6px;
    max-height: 300px;
    overflow-y: auto;
  }

  .command-group-label {
    padding: 6px 10px 4px;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-ghost);
  }

  .command-result {
    display: flex;
    align-items: center;
    padding: 7px 10px;
    border-radius: 3px;
    cursor: pointer;
    gap: 10px;
    transition: background 0.08s;
  }

  .command-result:hover,
  .command-result.active {
    background: var(--bg-hover);
  }

  .command-result.active {
    background: var(--accent-amber-glow);
  }

  .command-result-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-ghost);
    font-size: 11px;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 3px;
    flex-shrink: 0;
  }

  .command-result.active .command-result-icon {
    border-color: var(--accent-amber-dim);
    color: var(--accent-amber);
  }

  .command-result-text {
    flex: 1;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .command-result.active .command-result-text {
    color: var(--text-primary);
  }

  .command-result-kbd {
    font-size: 10px;
    color: var(--text-ghost);
    display: flex;
    gap: 3px;
  }

  .command-result-kbd kbd {
    padding: 1px 5px;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 2px;
    font-family: var(--font-mono);
    font-size: 9px;
  }

  /* === KEYBOARD SHORTCUTS PANEL (bottom-right) === */
  .shortcuts-panel {
    position: fixed;
    bottom: 40px;
    right: 16px;
    z-index: 50;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 5px;
    padding: 12px 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    animation: panel-in 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    width: 220px;
  }

  @keyframes panel-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .shortcuts-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-ghost);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .shortcuts-dismiss {
    cursor: pointer;
    color: var(--text-ghost);
    font-size: 12px;
    transition: color 0.15s;
  }

  .shortcuts-dismiss:hover {
    color: var(--text-secondary);
  }

  .shortcut-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 3px 0;
  }

  .shortcut-action {
    font-size: 11px;
    color: var(--text-tertiary);
  }

  .shortcut-keys {
    display: flex;
    gap: 3px;
  }

  .shortcut-keys kbd {
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 1px 5px;
    background: var(--bg-deep);
    border: 1px solid var(--border-subtle);
    border-radius: 2px;
    color: var(--text-ghost);
  }

  /* === SCROLLBAR === */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: var(--border-subtle);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--border-medium);
  }

  /* === ANIMATIONS === */
  .fade-in {
    animation: fadeIn 0.3s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .stagger-1 { animation-delay: 0.02s; }
  .stagger-2 { animation-delay: 0.04s; }
  .stagger-3 { animation-delay: 0.06s; }
  .stagger-4 { animation-delay: 0.08s; }
  .stagger-5 { animation-delay: 0.1s; }
  .stagger-6 { animation-delay: 0.12s; }
  .stagger-7 { animation-delay: 0.14s; }
  .stagger-8 { animation-delay: 0.16s; }
  .stagger-9 { animation-delay: 0.18s; }
  .stagger-10 { animation-delay: 0.2s; }
  .stagger-11 { animation-delay: 0.22s; }
  .stagger-12 { animation-delay: 0.24s; }

  /* === Editing state indicator === */
  .editing-indicator {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--accent-amber-dim);
  }

  .editing-indicator .blink {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent-amber);
    border-radius: 50%;
    animation: pulse-amber 1.5s ease-in-out infinite;
  }

  @keyframes pulse-amber {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Drag handle */
  .item-drag-handle {
    width: 10px;
    height: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    opacity: 0;
    cursor: grab;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .outline-item:hover .item-drag-handle {
    opacity: 1;
  }

  .item-drag-handle span {
    display: block;
    width: 4px;
    height: 1px;
    background: var(--text-ghost);
  }

  /* Selection count floating badge */
  .selection-badge {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent-blue);
    color: var(--bg-deep);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(91,141,217,0.3);
    z-index: 50;
    display: none;
  }
</style>
</head>
<body>

<div class="app">
  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="logo">
      <div class="logo-mark">
        <div class="nest-ring"></div>
        <div class="nest-ring"></div>
        <div class="nest-ring"></div>
      </div>
      <div class="logo-text">Vista<span>Nest</span></div>
    </div>
    <div class="header-actions">
      <button class="header-btn">
        <span class="editing-indicator"><span class="blink"></span></span>
        Saved
      </button>
      <button class="header-btn">Undo <span class="kbd">Ctrl+Z</span></button>
      <button class="header-btn">Search <span class="kbd">Ctrl+K</span></button>
      <button class="header-btn">? <span class="kbd">?</span></button>
    </div>
  </header>

  <!-- ===== BREADCRUMB ===== -->
  <div class="breadcrumb-bar">
    <span class="breadcrumb-item">My Lists</span>
    <span class="breadcrumb-sep">/</span>
    <span class="breadcrumb-item current">Product Roadmap Q2</span>
  </div>

  <!-- ===== MAIN ===== -->
  <div class="main">

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Lists</span>
        <button class="sidebar-add">+</button>
      </div>
      <div class="sidebar-list" id="sidebar-list"></div>
    </div>

    <!-- ===== OUTLINER ===== -->
    <div class="outliner" id="outliner">
      <div class="outline-list-title">
        <h1>Product Roadmap Q2</h1>
        <span class="item-count" id="item-count"></span>
      </div>
      <div id="outline-items"></div>
    </div>

    <!-- ===== DETAILS PANEL ===== -->
    <div class="details-panel" id="details-panel"></div>
  </div>

  <!-- ===== STATUS BAR ===== -->
  <div class="status-bar">
    <div class="status-left">
      <span class="status-indicator">
        <span class="status-dot"></span>
        Synced
      </span>
      <span id="status-position">Line 5 of 24</span>
    </div>
    <div class="status-right">
      <span class="status-mode">NORMAL</span>
      <span>VistaNest v0.9</span>
    </div>
  </div>
</div>

<!-- ===== SHORTCUTS PANEL ===== -->
<div class="shortcuts-panel" id="shortcuts-panel"></div>

<!-- ===== COMMAND PALETTE (toggle with Ctrl+K) ===== -->
<div class="command-overlay" id="command-overlay" style="display:none">
  <div class="command-palette">
    <div class="command-input-wrap">
      <span class="command-prompt">&gt;</span>
      <input class="command-input" placeholder="Type a command or search..." autofocus />
    </div>
    <div class="command-results" id="command-results"></div>
  </div>
</div>

<script>
(function() {
  // ===== DATA =====
  const sidebarItems = [
    { name: 'Inbox', icon: '>', count: 3, active: false },
    { name: 'Product Roadmap Q2', icon: '#', count: 24, active: true },
    { name: 'Sprint 14 Tasks', icon: '#', count: 18, active: false },
    { name: 'Architecture Notes', icon: '#', count: 7, active: false },
    { name: 'Meeting Notes', icon: '#', count: 12, active: false },
    { divider: true },
    { name: 'Personal', icon: '.', count: 5, active: false },
    { name: 'Reading List', icon: '.', count: 9, active: false },
    { name: 'Archive', icon: '.', count: 41, active: false },
  ];

  const outlineData = [
    { depth: 0, text: 'Authentication & Security', toggle: 'expanded', hasChildren: true, focused: false, completed: false },
    { depth: 1, text: 'Implement OAuth2 PKCE flow', toggle: 'leaf', hasChildren: false, focused: false, completed: true, badges: [{type:'badge-tag', label:'backend'}] },
    { depth: 1, text: 'Add multi-factor authentication', toggle: 'leaf', hasChildren: false, focused: false, completed: false, badges: [{type:'badge-priority', label:'P1'},{type:'badge-due', label:'Mar 28'}] },
    { depth: 1, text: 'Session management audit', toggle: 'leaf', hasChildren: false, focused: false, completed: false },
    { depth: 1, text: 'Rate limiting on auth endpoints', toggle: 'leaf', hasChildren: false, focused: false, completed: true },
    { depth: 0, text: 'Core Editor', toggle: 'expanded', hasChildren: true, focused: false, completed: false },
    { depth: 1, text: 'Keyboard navigation system', toggle: 'expanded', hasChildren: true, focused: true, completed: false, badges: [{type:'badge-priority', label:'P0'}] },
    { depth: 2, text: 'Arrow key traversal (up/down/left/right)', toggle: 'leaf', hasChildren: false, focused: false, completed: true },
    { depth: 2, text: 'Tab/Shift+Tab for indent/outdent', toggle: 'leaf', hasChildren: false, focused: false, completed: true },
    { depth: 2, text: 'Enter to create sibling, Shift+Enter for child', toggle: 'leaf', hasChildren: false, focused: false, completed: false },
    { depth: 2, text: 'Ctrl+Shift+Up/Down to move items', toggle: 'leaf', hasChildren: false, focused: false, completed: false, badges: [{type:'badge-due', label:'Mar 22'}] },
    { depth: 1, text: 'Multi-select with Shift+Click and Ctrl+Click', toggle: 'leaf', hasChildren: false, focused: false, completed: false, selected: true },
    { depth: 1, text: 'Drag and drop reordering', toggle: 'leaf', hasChildren: false, focused: false, completed: false, selected: true },
    { depth: 1, text: 'Inline rich text formatting', toggle: 'collapsed', hasChildren: true, focused: false, completed: false, collapsedCount: 4 },
    { depth: 0, text: 'Collaboration', toggle: 'collapsed', hasChildren: true, focused: false, completed: false, collapsedCount: 6 },
    { depth: 0, text: 'Data & Sync', toggle: 'expanded', hasChildren: true, focused: false, completed: false },
    { depth: 1, text: 'Implement CRDT-based conflict resolution', toggle: 'leaf', hasChildren: false, focused: false, completed: false, badges: [{type:'badge-priority', label:'P1'},{type:'badge-tag', label:'infra'}] },
    { depth: 1, text: 'Offline support with service workers', toggle: 'leaf', hasChildren: false, focused: false, completed: false },
    { depth: 1, text: 'Import from Checkvist, WorkFlowy, OPML', toggle: 'expanded', hasChildren: true, focused: false, completed: false },
    { depth: 2, text: 'OPML parser', toggle: 'leaf', hasChildren: false, focused: false, completed: true },
    { depth: 2, text: 'Checkvist JSON import', toggle: 'leaf', hasChildren: false, focused: false, completed: false },
    { depth: 2, text: 'WorkFlowy backup import', toggle: 'leaf', hasChildren: false, focused: false, completed: false },
    { depth: 1, text: 'Export to Markdown, JSON, OPML', toggle: 'leaf', hasChildren: false, focused: false, completed: false },
    { depth: 0, text: 'Mobile & PWA', toggle: 'collapsed', hasChildren: true, focused: false, completed: false, collapsedCount: 5 },
  ];

  const shortcuts = [
    { action: 'Move focus', keys: ['Up', 'Down'] },
    { action: 'Collapse / Expand', keys: ['Left', 'Right'] },
    { action: 'Indent', keys: ['Tab'] },
    { action: 'Outdent', keys: ['Shift', 'Tab'] },
    { action: 'New sibling', keys: ['Enter'] },
    { action: 'New child', keys: ['Shift', 'Enter'] },
    { action: 'Toggle done', keys: ['Ctrl', 'Enter'] },
    { action: 'Move item', keys: ['Ctrl', 'Shift', 'Arrow'] },
    { action: 'Command palette', keys: ['Ctrl', 'K'] },
    { action: 'Delete item', keys: ['Ctrl', 'Del'] },
  ];

  const commandResults = [
    { group: 'Actions', items: [
      { icon: '+', text: 'New item below', keys: ['Enter'] },
      { icon: '>', text: 'Indent item', keys: ['Tab'] },
      { icon: '<', text: 'Outdent item', keys: ['Shift','Tab'] },
      { icon: 'x', text: 'Toggle complete', keys: ['Ctrl','Enter'] },
    ]},
    { group: 'Navigation', items: [
      { icon: '/', text: 'Search in list', keys: ['Ctrl','F'] },
      { icon: '#', text: 'Go to list...', keys: ['Ctrl','L'] },
      { icon: '^', text: 'Zoom into item', keys: ['Ctrl','.'] },
    ]},
  ];

  // ===== RENDER SIDEBAR =====
  const sidebarEl = document.getElementById('sidebar-list');
  let sidebarHtml = '';
  sidebarItems.forEach(function(item, i) {
    if (item.divider) {
      sidebarHtml += '<div class="sidebar-section-divider"></div>';
      return;
    }
    sidebarHtml += '<div class="list-item fade-in stagger-' + (i + 1) + (item.active ? ' active' : '') + '">'
      + '<div class="list-icon">' + item.icon + '</div>'
      + '<div class="list-name">' + item.name + '</div>'
      + '<div class="list-count">' + item.count + '</div>'
      + '</div>';
  });
  sidebarEl.innerHTML = sidebarHtml;

  // ===== RENDER OUTLINE =====
  const outlineEl = document.getElementById('outline-items');
  const countEl = document.getElementById('item-count');
  countEl.textContent = outlineData.length + ' items';

  // Pre-calculate which depths need indent guides
  function getIndentGuides(depth) {
    let html = '';
    if (depth > 0) {
      html = '<div class="indent-guides">';
      for (let g = 0; g < depth; g++) {
        html += '<div class="indent-guide" style="left:' + (g * 28) + 'px"></div>';
      }
      html += '</div>';
    }
    return html;
  }

  let outlineHtml = '';
  outlineData.forEach(function(item, i) {
    let classes = 'outline-item depth-' + item.depth + ' fade-in stagger-' + Math.min(i + 1, 12);
    if (item.focused) classes += ' focused';
    if (item.completed) classes += ' completed';
    if (item.selected) classes += ' selected';
    if (item.hasChildren) classes += ' has-children';

    let toggleClass = 'item-toggle';
    let toggleContent = '';
    if (item.toggle === 'expanded') {
      toggleClass += ' expanded';
      toggleContent = '\u25B6';
    } else if (item.toggle === 'collapsed') {
      toggleContent = '\u25B6';
    } else {
      toggleClass += ' leaf';
      toggleContent = '\u25B6';
    }

    let badgesHtml = '';
    if (item.badges) {
      badgesHtml = '<div class="item-meta">';
      item.badges.forEach(function(b) {
        badgesHtml += '<span class="item-badge ' + b.type + '">' + b.label + '</span>';
      });
      badgesHtml += '</div>';
    }

    let collapsedHtml = '';
    if (item.collapsedCount) {
      collapsedHtml = '<span class="collapsed-count">' + item.collapsedCount + ' hidden</span>';
    }

    let checkboxClass = 'item-checkbox';
    if (item.completed) checkboxClass += ' checked';

    outlineHtml += '<div class="' + classes + '">'
      + getIndentGuides(item.depth)
      + '<div class="item-indent"></div>'
      + '<div class="item-drag-handle"><span></span><span></span><span></span></div>'
      + '<div class="' + toggleClass + '">' + toggleContent + '</div>'
      + '<div class="item-bullet"><div class="bullet-dot"></div></div>'
      + '<div class="' + checkboxClass + '"></div>'
      + '<div class="item-text">' + item.text + collapsedHtml + '</div>'
      + badgesHtml
      + '</div>';
  });
  outlineEl.innerHTML = outlineHtml;

  // ===== RENDER DETAILS PANEL =====
  // Show details for the focused item
  var detailsEl = document.getElementById('details-panel');
  detailsEl.innerHTML = '<div class="details-header">'
    + '<div class="details-label">Item Details</div>'
    + '<div class="details-item-text">Keyboard navigation system</div>'
    + '</div>'
    + '<div class="details-section">'
    + '<div class="details-field">'
    + '<div class="details-field-label">Status</div>'
    + '<div class="details-field-value">In Progress</div>'
    + '</div>'
    + '<div class="details-field">'
    + '<div class="details-field-label">Priority</div>'
    + '<div class="details-field-value"><span class="item-badge badge-priority">P0</span></div>'
    + '</div>'
    + '<div class="details-field">'
    + '<div class="details-field-label">Assignee</div>'
    + '<div class="details-field-value editable">jigargosar</div>'
    + '</div>'
    + '<div class="details-field">'
    + '<div class="details-field-label">Due Date</div>'
    + '<div class="details-field-value editable">2026-03-22</div>'
    + '</div>'
    + '<div class="details-field">'
    + '<div class="details-field-label">Tags</div>'
    + '<div class="details-field-value">'
    + '<span class="item-badge badge-tag">core</span> '
    + '<span class="item-badge badge-tag">ux</span>'
    + '</div>'
    + '</div>'
    + '<div class="details-field">'
    + '<div class="details-field-label">Created</div>'
    + '<div class="details-field-value">2026-02-18 14:32</div>'
    + '</div>'
    + '<div class="details-field">'
    + '<div class="details-field-label">Modified</div>'
    + '<div class="details-field-value">2026-03-15 09:47</div>'
    + '</div>'
    + '</div>'
    + '<div class="details-note">'
    + '<div class="details-label">Notes</div>'
    + '<div class="details-note-content">'
    + 'Core navigation must feel instant. No visible\n'
    + 'latency between keypress and cursor movement.\n'
    + '\n'
    + 'Reference implementations:\n'
    + '- Checkvist: gold standard for kbd nav\n'
    + '- WorkFlowy: smooth but limited\n'
    + '- Dynalist: good multi-select model\n'
    + '\n'
    + 'Test with 1000+ item lists for perf.\n'
    + 'Must maintain 60fps during rapid traversal.'
    + '</div>'
    + '</div>';

  // ===== RENDER SHORTCUTS PANEL =====
  var shortcutsEl = document.getElementById('shortcuts-panel');
  var shortcutsHtml = '<div class="shortcuts-title">'
    + '<span>Keyboard Shortcuts</span>'
    + '<span class="shortcuts-dismiss" id="dismiss-shortcuts">\u00D7</span>'
    + '</div>';
  shortcuts.forEach(function(s) {
    shortcutsHtml += '<div class="shortcut-row">'
      + '<span class="shortcut-action">' + s.action + '</span>'
      + '<span class="shortcut-keys">';
    s.keys.forEach(function(k) {
      shortcutsHtml += '<kbd>' + k + '</kbd>';
    });
    shortcutsHtml += '</span></div>';
  });
  shortcutsEl.innerHTML = shortcutsHtml;

  // ===== RENDER COMMAND PALETTE =====
  var cmdResultsEl = document.getElementById('command-results');
  var cmdHtml = '';
  var isFirst = true;
  commandResults.forEach(function(group) {
    cmdHtml += '<div class="command-group-label">' + group.group + '</div>';
    group.items.forEach(function(item) {
      var activeClass = isFirst ? ' active' : '';
      isFirst = false;
      cmdHtml += '<div class="command-result' + activeClass + '">'
        + '<div class="command-result-icon">' + item.icon + '</div>'
        + '<div class="command-result-text">' + item.text + '</div>'
        + '<div class="command-result-kbd">';
      item.keys.forEach(function(k) {
        cmdHtml += '<kbd>' + k + '</kbd>';
      });
      cmdHtml += '</div></div>';
    });
  });
  cmdResultsEl.innerHTML = cmdHtml;

  // ===== INTERACTIONS =====
  // Toggle command palette
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'k') {
      e.preventDefault();
      var overlay = document.getElementById('command-overlay');
      if (overlay.style.display === 'none') {
        overlay.style.display = 'flex';
        overlay.querySelector('.command-input').focus();
      } else {
        overlay.style.display = 'none';
      }
    }
    if (e.key === 'Escape') {
      document.getElementById('command-overlay').style.display = 'none';
    }
  });

  document.getElementById('command-overlay').addEventListener('click', function(e) {
    if (e.target === this) {
      this.style.display = 'none';
    }
  });

  // Dismiss shortcuts
  document.getElementById('dismiss-shortcuts').addEventListener('click', function() {
    document.getElementById('shortcuts-panel').style.display = 'none';
  });

  // Toggle collapse/expand on arrows
  document.querySelectorAll('.item-toggle:not(.leaf)').forEach(function(el) {
    el.addEventListener('click', function() {
      this.classList.toggle('expanded');
    });
  });

  // Checkbox toggle
  document.querySelectorAll('.item-checkbox').forEach(function(el) {
    el.addEventListener('click', function() {
      this.classList.toggle('checked');
      var row = this.closest('.outline-item');
      if (row) row.classList.toggle('completed');
    });
  });
})();
</script>
</body>
</html>

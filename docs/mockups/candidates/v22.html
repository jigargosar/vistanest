<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VistaNest — Outliner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0e0f13;
  --bg-surface: #14151a;
  --bg-raised: #1a1b22;
  --bg-hover: #1f2029;
  --bg-focused: #1c1d2a;
  --border-subtle: #23242e;
  --border-dim: #2a2b36;
  --text-primary: #d4d5dc;
  --text-secondary: #82838f;
  --text-tertiary: #555660;
  --text-ghost: #3a3b45;
  --accent: #6f8cff;
  --accent-dim: #4a5a99;
  --accent-glow: rgba(111, 140, 255, 0.08);
  --accent-glow-strong: rgba(111, 140, 255, 0.15);
  --done-color: #4a5a44;
  --done-text: #6a7a64;
  --warning: #c9a04a;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --content-width: 740px;
  --topbar-height: 56px;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ---- Noise texture overlay ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.025;
  pointer-events: none;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 200px;
}

/* ---- Topbar ---- */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--topbar-height);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  padding: 0 24px;
  z-index: 100;
  backdrop-filter: blur(12px);
  background: rgba(20, 21, 26, 0.88);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.logo {
  font-weight: 500;
  font-size: 15px;
  letter-spacing: 0.03em;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-mark {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  background: linear-gradient(135deg, var(--accent) 0%, #5a6fd4 100%);
  opacity: 0.85;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13.5px;
  color: var(--text-tertiary);
  margin-left: 8px;
}

.breadcrumb-sep {
  font-size: 11px;
  color: var(--text-ghost);
  margin: 0 2px;
}

.breadcrumb-item {
  color: var(--text-tertiary);
  cursor: pointer;
  transition: color 0.15s;
  text-decoration: none;
}

.breadcrumb-item:hover {
  color: var(--text-secondary);
}

.breadcrumb-current {
  color: var(--text-secondary);
  font-weight: 400;
}

.topbar-center {
  flex: 1;
  display: flex;
  justify-content: center;
  padding: 0 32px;
}

.search-bar {
  position: relative;
  width: 100%;
  max-width: 380px;
}

.search-bar input {
  width: 100%;
  height: 34px;
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  padding: 0 14px 0 36px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
}

.search-bar input::placeholder {
  color: var(--text-ghost);
}

.search-bar input:focus {
  border-color: var(--accent-dim);
  background: var(--bg-hover);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-ghost);
  pointer-events: none;
}

.search-shortcut {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.topbar-btn {
  width: 34px;
  height: 34px;
  border: none;
  background: transparent;
  border-radius: 7px;
  color: var(--text-tertiary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
}

.topbar-btn:hover {
  background: var(--bg-hover);
  color: var(--text-secondary);
}

/* ---- Keyboard badge ---- */
.kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  height: 20px;
  padding: 0 5px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 500;
  color: var(--text-ghost);
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: 4px;
  letter-spacing: 0.02em;
  line-height: 1;
  flex-shrink: 0;
}

.kbd-group {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  margin-left: auto;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.2s;
}

/* ---- Main content ---- */
.main {
  padding-top: calc(var(--topbar-height) + 24px);
  padding-bottom: 120px;
}

.content {
  max-width: var(--content-width);
  margin: 0 auto;
  padding: 0 32px;
}

/* ---- List title ---- */
.list-header {
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border-subtle);
}

.list-title {
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--text-primary);
  line-height: 1.3;
  margin-bottom: 6px;
}

.list-meta {
  font-size: 13px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 14px;
}

.list-meta-dot {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--text-ghost);
}

/* ---- Outline items ---- */
.outline {
  list-style: none;
}

.outline-item {
  position: relative;
}

.item-row {
  display: flex;
  align-items: flex-start;
  gap: 4px;
  padding: 7px 8px 7px 0;
  border-radius: 6px;
  cursor: default;
  transition: background 0.12s;
  position: relative;
}

.item-row:hover {
  background: var(--bg-hover);
}

.item-row:hover .kbd-group {
  opacity: 1;
}

.item-row.is-focused {
  background: var(--bg-focused);
  box-shadow: inset 3px 0 0 var(--accent);
}

.item-row.is-focused .kbd-group {
  opacity: 1;
}

/* Toggle chevron */
.item-toggle {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  border-radius: 5px;
  transition: background 0.12s;
  margin-top: 1px;
}

.item-toggle:hover {
  background: var(--bg-raised);
}

.item-toggle svg {
  transition: transform 0.2s ease;
}

.item-toggle.is-collapsed svg {
  transform: rotate(-90deg);
}

.item-toggle.is-leaf {
  visibility: hidden;
}

/* Item content */
.item-content {
  flex: 1;
  min-width: 0;
  padding-top: 3px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.item-text {
  font-size: 16px;
  line-height: 1.55;
  color: var(--text-primary);
  font-weight: 400;
  flex: 1;
  min-width: 0;
}

.item-text.is-done {
  text-decoration: line-through;
  text-decoration-color: var(--done-color);
  color: var(--done-text);
}

.item-note {
  font-size: 13.5px;
  color: var(--text-tertiary);
  line-height: 1.5;
  margin-top: 3px;
  font-style: italic;
  font-weight: 300;
}

.item-tag {
  display: inline-flex;
  align-items: center;
  height: 20px;
  padding: 0 7px;
  font-size: 11px;
  font-weight: 500;
  border-radius: 4px;
  letter-spacing: 0.02em;
  flex-shrink: 0;
  margin-top: 2px;
}

.tag-priority {
  background: rgba(201, 160, 74, 0.12);
  color: var(--warning);
  border: 1px solid rgba(201, 160, 74, 0.2);
}

.tag-wip {
  background: rgba(111, 140, 255, 0.1);
  color: var(--accent);
  border: 1px solid rgba(111, 140, 255, 0.18);
}

.tag-count {
  background: var(--bg-raised);
  color: var(--text-tertiary);
  border: 1px solid var(--border-subtle);
  font-family: var(--font-mono);
  font-size: 10.5px;
}

/* ---- Nesting ---- */
.outline-children {
  list-style: none;
  padding-left: 28px;
  position: relative;
}

.outline-children::before {
  content: '';
  position: absolute;
  left: 13px;
  top: 0;
  bottom: 8px;
  width: 1px;
  background: var(--border-subtle);
  border-radius: 1px;
}

/* depth 2 */
.outline-children .outline-children {
  padding-left: 28px;
}

/* ---- Bottom status bar ---- */
.status-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 30px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  font-size: 11.5px;
  color: var(--text-ghost);
  font-family: var(--font-mono);
  z-index: 100;
}

.status-left, .status-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.status-separator {
  width: 1px;
  height: 12px;
  background: var(--border-subtle);
}

/* ---- Command palette hint ---- */
.cmd-palette-hint {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  border-radius: 10px;
  font-size: 12.5px;
  color: var(--text-tertiary);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  animation: hint-in 0.6s ease both;
  animation-delay: 1.5s;
}

@keyframes hint-in {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ---- Skeleton load animation ---- */
.outline-item {
  animation: item-in 0.35s ease both;
}

@keyframes item-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-ghost); }

/* ---- Selection ---- */
::selection {
  background: rgba(111, 140, 255, 0.25);
  color: var(--text-primary);
}
</style>
</head>
<body>

<!-- ======== TOPBAR ======== -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <div class="logo-mark"></div>
      VistaNest
    </div>
    <div class="breadcrumb">
      <a class="breadcrumb-item" href="#">Projects</a>
      <span class="breadcrumb-sep">&#8250;</span>
      <a class="breadcrumb-item" href="#">VistaNest App</a>
      <span class="breadcrumb-sep">&#8250;</span>
      <span class="breadcrumb-current">v0.9 Launch Plan</span>
    </div>
  </div>

  <div class="topbar-center">
    <div class="search-bar">
      <span class="search-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </span>
      <input type="text" placeholder="Search items..." spellcheck="false">
      <span class="search-shortcut"><span class="kbd">/</span></span>
    </div>
  </div>

  <div class="topbar-right">
    <button class="topbar-btn" title="Undo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>
    <button class="topbar-btn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <button class="topbar-btn" title="Help">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </button>
  </div>
</header>

<!-- ======== MAIN ======== -->
<main class="main">
  <div class="content">

    <div class="list-header">
      <h1 class="list-title">v0.9 Launch Plan</h1>
      <div class="list-meta">
        <span>23 items</span>
        <span class="list-meta-dot"></span>
        <span>8 completed</span>
        <span class="list-meta-dot"></span>
        <span>Updated 2 hours ago</span>
      </div>
    </div>

    <ul class="outline" id="outline-root"></ul>

  </div>
</main>

<!-- ======== STATUS BAR ======== -->
<div class="status-bar">
  <div class="status-left">
    <span>NORMAL</span>
    <span class="status-separator"></span>
    <span>item 3 of 23</span>
  </div>
  <div class="status-right">
    <span>?  help</span>
    <span class="status-separator"></span>
    <span>Ctrl+K  commands</span>
  </div>
</div>

<!-- ======== COMMAND PALETTE HINT ======== -->
<div class="cmd-palette-hint">
  Press
  <span class="kbd">Ctrl</span>
  <span class="kbd">K</span>
  for command palette
</div>

<script>
// ============================================================
// Outline data
// ============================================================
var outlineData = [
  {
    text: "Core keyboard navigation",
    tag: { label: "3/5", cls: "tag-count" },
    done: false,
    focused: false,
    collapsed: false,
    shortcuts: ["j", "k"],
    children: [
      { text: "Up/down movement between siblings", done: true, children: [] },
      { text: "Indent and outdent with Tab / Shift+Tab", done: true, children: [] },
      { text: "Collapse/expand toggle", done: true, children: [] },
      { text: "Move items with Alt+Arrow keys", done: false, tag: { label: "WIP", cls: "tag-wip" }, shortcuts: ["Alt", "\u2191\u2193"], children: [] },
      { text: "Zoom into focused subtree", done: false, children: [] }
    ]
  },
  {
    text: "Inline editing and input",
    done: false,
    collapsed: false,
    shortcuts: ["Enter"],
    children: [
      { text: "Enter to start editing focused item", done: true, children: [] },
      { text: "Escape to exit edit mode", done: true, children: [] },
      {
        text: "Multi-line notes support",
        note: "Collapse long notes by default, expand on focus",
        done: false,
        children: []
      },
      { text: "Markdown-style inline formatting", done: false, children: [] }
    ]
  },
  {
    text: "Search and filtering",
    tag: { label: "PRIORITY", cls: "tag-priority" },
    done: false,
    focused: true,
    collapsed: false,
    shortcuts: ["/"],
    children: [
      { text: "Quick search with / shortcut", done: false, children: [] },
      { text: "Filter by tags and completion status", done: false, children: [] },
      { text: "Highlight matching text in results", done: false, children: [] }
    ]
  },
  {
    text: "Data persistence",
    done: false,
    collapsed: true,
    children: [
      { text: "LocalStorage for offline support", done: false, children: [] },
      { text: "Export as OPML and Markdown", done: false, children: [] },
      { text: "Import from Checkvist and WorkFlowy", done: false, children: [] }
    ]
  },
  {
    text: "Visual polish and theming",
    done: false,
    collapsed: false,
    children: [
      { text: "Dark theme as default", done: true, children: [] },
      { text: "Light theme option", done: false, children: [] },
      { text: "Custom accent color picker", done: false, children: [] },
      {
        text: "Print-friendly stylesheet",
        done: true,
        children: []
      }
    ]
  },
  {
    text: "Performance benchmarks on 10k-item lists",
    done: false,
    collapsed: false,
    tag: { label: "WIP", cls: "tag-wip" },
    children: []
  }
];

// ============================================================
// Render
// ============================================================
function renderItem(item, depth, index) {
  var li = document.createElement("li");
  li.className = "outline-item";
  li.style.animationDelay = (index * 0.04) + "s";

  var hasChildren = item.children && item.children.length > 0;
  var isCollapsed = item.collapsed === true;

  // Row
  var row = document.createElement("div");
  row.className = "item-row";
  if (item.focused) row.className += " is-focused";

  // Toggle
  var toggle = document.createElement("div");
  toggle.className = "item-toggle";
  if (!hasChildren) {
    toggle.className += " is-leaf";
  } else if (isCollapsed) {
    toggle.className += " is-collapsed";
  }
  toggle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
  row.appendChild(toggle);

  // Content wrapper
  var content = document.createElement("div");
  content.className = "item-content";

  // Text
  var textEl = document.createElement("div");
  var textSpan = document.createElement("div");
  textSpan.className = "item-text";
  if (item.done) textSpan.className += " is-done";
  textSpan.textContent = item.text;
  textEl.appendChild(textSpan);

  if (item.note) {
    var noteEl = document.createElement("div");
    noteEl.className = "item-note";
    noteEl.textContent = item.note;
    textEl.appendChild(noteEl);
  }

  content.appendChild(textEl);

  // Tag
  if (item.tag) {
    var tagEl = document.createElement("span");
    tagEl.className = "item-tag " + item.tag.cls;
    tagEl.textContent = item.tag.label;
    content.appendChild(tagEl);
  }

  // Collapsed count badge
  if (hasChildren && isCollapsed) {
    var countTag = document.createElement("span");
    countTag.className = "item-tag tag-count";
    countTag.textContent = item.children.length + " hidden";
    content.appendChild(countTag);
  }

  // Keyboard shortcut badges
  if (item.shortcuts && item.shortcuts.length > 0) {
    var kbdGroup = document.createElement("span");
    kbdGroup.className = "kbd-group";
    for (var s = 0; s < item.shortcuts.length; s++) {
      var kbd = document.createElement("span");
      kbd.className = "kbd";
      kbd.textContent = item.shortcuts[s];
      kbdGroup.appendChild(kbd);
    }
    content.appendChild(kbdGroup);
  }

  row.appendChild(content);
  li.appendChild(row);

  // Children
  if (hasChildren && !isCollapsed) {
    var childList = document.createElement("ul");
    childList.className = "outline-children";
    for (var c = 0; c < item.children.length; c++) {
      childList.appendChild(renderItem(item.children[c], depth + 1, index + c + 1));
    }
    li.appendChild(childList);
  }

  // Toggle click
  if (hasChildren) {
    toggle.addEventListener("click", function() {
      item.collapsed = !item.collapsed;
      renderAll();
    });
  }

  return li;
}

function renderAll() {
  var root = document.getElementById("outline-root");
  root.innerHTML = "";
  for (var i = 0; i < outlineData.length; i++) {
    root.appendChild(renderItem(outlineData[i], 0, i));
  }
}

renderAll();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VistaNest — Outliner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0e0f13;
  --bg-surface: #14151a;
  --bg-raised: #1a1b22;
  --bg-hover: #1f2029;
  --bg-focus: #1c1d28;
  --border-subtle: #25262f;
  --border-dim: #2a2b36;
  --text-primary: #d4d4dc;
  --text-secondary: #8b8b9e;
  --text-tertiary: #5c5c72;
  --text-ghost: #3d3d52;
  --accent: #6e8efb;
  --accent-dim: #4a5f9e;
  --accent-glow: rgba(110, 142, 251, 0.08);
  --accent-glow-strong: rgba(110, 142, 251, 0.14);
  --chevron: #4a4a60;
  --chevron-hover: #7a7a96;
  --badge-bg: #1e1f2a;
  --badge-border: #2e2f3c;
  --badge-text: #6b6b82;
  --complete-text: #4a4a5e;
  --complete-line: #3a3a4e;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 10px;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* === Noise texture overlay === */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* ========================================
   TOP BAR
   ======================================== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-deep);
  border-bottom: 1px solid var(--border-subtle);
  backdrop-filter: blur(12px);
}

.topbar-inner {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 15px;
  letter-spacing: 0.04em;
  color: var(--text-secondary);
  flex-shrink: 0;
  user-select: none;
}

.logo span {
  color: var(--accent);
  font-weight: 500;
}

.topbar-nav {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  color: var(--text-tertiary);
}

.breadcrumb-item {
  padding: 3px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: color 0.15s, background 0.15s;
  white-space: nowrap;
}

.breadcrumb-item:hover {
  color: var(--text-secondary);
  background: var(--bg-hover);
}

.breadcrumb-sep {
  color: var(--text-ghost);
  font-size: 11px;
}

.topbar-spacer {
  flex: 1;
}

.search-trigger {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  color: var(--text-tertiary);
  font-size: 13px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  user-select: none;
}

.search-trigger:hover {
  border-color: var(--border-dim);
  color: var(--text-secondary);
}

.search-trigger .search-icon {
  width: 14px;
  height: 14px;
  opacity: 0.5;
}

.search-trigger kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 1px 5px;
  background: var(--bg-hover);
  border: 1px solid var(--border-dim);
  border-radius: 3px;
  color: var(--text-ghost);
  line-height: 1.4;
}

/* ========================================
   CONTENT AREA
   ======================================== */
.content {
  max-width: 820px;
  margin: 0 auto;
  padding: 40px 32px 120px;
}

/* === List title === */
.list-title {
  font-size: 26px;
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  margin-bottom: 8px;
  line-height: 1.3;
}

.list-meta {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-bottom: 40px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.list-meta-sep {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--text-ghost);
}

/* ========================================
   OUTLINER ITEMS
   ======================================== */
.outline {
  list-style: none;
}

.outline-item {
  position: relative;
}

/* Connection lines for nested items */
.outline-item .outline {
  position: relative;
}

.outline-item .outline::before {
  content: '';
  position: absolute;
  left: 13px;
  top: 0;
  bottom: 12px;
  width: 1px;
  background: var(--border-subtle);
}

.item-row {
  display: flex;
  align-items: flex-start;
  gap: 4px;
  padding: 7px 8px 7px 4px;
  border-radius: var(--radius-md);
  cursor: default;
  transition: background 0.12s;
  position: relative;
}

.item-row:hover {
  background: var(--bg-hover);
}

/* === Focused item === */
.item-row.focused {
  background: var(--accent-glow);
}

.item-row.focused::before {
  content: '';
  position: absolute;
  left: 0;
  top: 6px;
  bottom: 6px;
  width: 2px;
  border-radius: 1px;
  background: var(--accent);
  opacity: 0.7;
}

/* === Chevron toggle === */
.item-toggle {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: background 0.12s;
  margin-top: 1px;
}

.item-toggle:hover {
  background: var(--bg-raised);
}

.item-toggle svg {
  width: 14px;
  height: 14px;
  color: var(--chevron);
  transition: transform 0.2s ease, color 0.15s;
}

.item-toggle:hover svg {
  color: var(--chevron-hover);
}

.item-toggle.expanded svg {
  transform: rotate(90deg);
}

.item-toggle.leaf {
  visibility: hidden;
}

/* === Bullet for leaf nodes === */
.item-bullet {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.item-bullet::after {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--text-ghost);
  transition: background 0.15s;
}

.item-row:hover .item-bullet::after {
  background: var(--text-tertiary);
}

/* === Checkbox === */
.item-check {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  cursor: pointer;
}

.item-check-box {
  width: 15px;
  height: 15px;
  border: 1.5px solid var(--border-dim);
  border-radius: 3px;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}

.item-row:hover .item-check-box {
  border-color: var(--text-tertiary);
}

.item-check-box.checked {
  background: var(--accent-dim);
  border-color: var(--accent-dim);
}

.item-check-box.checked::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 4px;
  width: 5px;
  height: 8px;
  border: solid var(--bg-deep);
  border-width: 0 1.5px 1.5px 0;
  transform: rotate(45deg);
}

/* === Item text === */
.item-text {
  flex: 1;
  font-size: 16px;
  line-height: 1.7;
  color: var(--text-primary);
  padding-top: 2px;
  font-weight: 300;
  letter-spacing: 0.005em;
}

.item-text strong {
  font-weight: 500;
  color: var(--text-primary);
}

.item-text .note-ref {
  color: var(--accent);
  opacity: 0.75;
  font-size: 14px;
}

/* Completed items */
.item-text.completed {
  color: var(--complete-text);
  text-decoration: line-through;
  text-decoration-color: var(--complete-line);
}

/* === Inline tags === */
.tag {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-family: var(--font-mono);
  font-weight: 400;
  padding: 1px 7px;
  border-radius: 3px;
  margin-left: 6px;
  vertical-align: middle;
  position: relative;
  top: -1px;
}

.tag-priority {
  background: rgba(251, 110, 110, 0.1);
  color: #e06464;
  border: 1px solid rgba(251, 110, 110, 0.15);
}

.tag-status {
  background: rgba(110, 200, 140, 0.1);
  color: #6ec88c;
  border: 1px solid rgba(110, 200, 140, 0.12);
}

.tag-label {
  background: rgba(200, 180, 110, 0.1);
  color: #c8b46e;
  border: 1px solid rgba(200, 180, 110, 0.12);
}

.tag-info {
  background: var(--accent-glow);
  color: var(--accent);
  border: 1px solid rgba(110, 142, 251, 0.15);
}

/* === Keyboard shortcut badges === */
.kbd-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  margin-left: 8px;
  vertical-align: middle;
  position: relative;
  top: -1px;
}

.kbd-badge kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 1px 5px;
  background: var(--badge-bg);
  border: 1px solid var(--badge-border);
  border-radius: 3px;
  color: var(--badge-text);
  line-height: 1.5;
}

/* === Item count for collapsed === */
.item-count {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-ghost);
  padding: 2px 7px;
  background: var(--bg-raised);
  border-radius: 3px;
  margin-left: 8px;
  flex-shrink: 0;
  align-self: center;
}

/* === Notes / secondary text === */
.item-note {
  font-size: 13px;
  color: var(--text-tertiary);
  line-height: 1.6;
  padding-left: 30px;
  padding-bottom: 4px;
  font-style: italic;
  font-weight: 300;
}

/* === Nesting indentation === */
.depth-1 { padding-left: 28px; }
.depth-2 { padding-left: 56px; }
.depth-3 { padding-left: 84px; }

/* ========================================
   BOTTOM HELP BAR
   ======================================== */
.help-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg-surface);
  border-top: 1px solid var(--border-subtle);
  padding: 10px 32px;
  display: flex;
  justify-content: center;
  gap: 24px;
  z-index: 100;
}

.help-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-ghost);
}

.help-item kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 1px 5px;
  background: var(--badge-bg);
  border: 1px solid var(--badge-border);
  border-radius: 3px;
  color: var(--badge-text);
  line-height: 1.5;
}

.help-item span {
  color: var(--text-tertiary);
}

/* ========================================
   ANIMATIONS
   ======================================== */
@keyframes fadeSlideIn {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.outline > .outline-item {
  animation: fadeSlideIn 0.35s ease both;
}

.content {
  animation: fadeSlideIn 0.4s ease both;
}

/* === Focus pulse for the focused row === */
@keyframes focusPulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

.item-row.focused::before {
  animation: focusPulse 2.5s ease-in-out infinite;
}

/* === Selection highlight when hovering === */
.item-row::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-md);
  border: 1px solid transparent;
  pointer-events: none;
  transition: border-color 0.15s;
}

.item-row.focused::after {
  border-color: var(--accent-glow-strong);
}

/* ========================================
   SEARCH OVERLAY (visual only)
   ======================================== */
.search-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(10, 10, 15, 0.7);
  backdrop-filter: blur(4px);
  align-items: flex-start;
  justify-content: center;
  padding-top: 120px;
}

.search-overlay.visible {
  display: flex;
}

.search-box {
  width: 520px;
  background: var(--bg-raised);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-lg);
  padding: 4px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: searchIn 0.2s ease;
}

@keyframes searchIn {
  from {
    opacity: 0;
    transform: translateY(-8px) scale(0.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.search-input-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
}

.search-input-wrap svg {
  width: 18px;
  height: 18px;
  color: var(--text-tertiary);
  flex-shrink: 0;
}

.search-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--text-primary);
  font-weight: 300;
}

.search-input::placeholder {
  color: var(--text-ghost);
}

.search-results {
  border-top: 1px solid var(--border-subtle);
  padding: 6px;
  max-height: 320px;
  overflow-y: auto;
}

.search-result-item {
  padding: 10px 14px;
  border-radius: var(--radius-md);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background 0.1s;
}

.search-result-item:hover,
.search-result-item.selected {
  background: var(--bg-hover);
}

.search-result-item .sr-icon {
  color: var(--text-ghost);
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

.search-result-item .sr-text {
  font-size: 14px;
  color: var(--text-secondary);
  flex: 1;
}

.search-result-item .sr-text mark {
  background: none;
  color: var(--text-primary);
  font-weight: 500;
}

.search-result-item .sr-path {
  font-size: 11px;
  color: var(--text-ghost);
  font-family: var(--font-mono);
}

.search-footer {
  border-top: 1px solid var(--border-subtle);
  padding: 8px 14px;
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-ghost);
}

.search-footer kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 0 4px;
  background: var(--badge-bg);
  border: 1px solid var(--badge-border);
  border-radius: 2px;
  color: var(--badge-text);
  margin: 0 2px;
}
</style>
</head>

        text: 'Offline-first with IndexedDB sync',
        tag: { label: 'in-progress', type: 'status' },
        children: []
      },
      {
        text: 'Smooth 60fps expand/collapse animations',
        children: []
      }
    ]
  }
];

const searchData = [
  { text: 'Onboarding wizard with sample data', path: 'Authentication', match: 'Onboarding' },
  { text: 'OAuth2 integration with Google & GitHub', path: 'Authentication', match: 'OAuth2' },
  { text: 'OPML import/export for interop', path: 'Export', match: 'OPML' },
  { text: 'Offline-first with IndexedDB sync', path: 'Performance', match: 'Offline' },
];

// Chevron SVG
const chevronSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

// Render outline
function renderItem(item, depth) {
  const li = document.createElement('li');
  li.className = 'outline-item';

  const row = document.createElement('div');
  row.className = 'item-row' + (item.focused ? ' focused' : '');

  const hasChildren = (item.children && item.children.length > 0) || item.count;

  // Toggle or bullet
  if (hasChildren) {
    const toggle = document.createElement('span');
    toggle.className = 'item-toggle' + (item.expanded ? ' expanded' : '');
    toggle.innerHTML = chevronSvg;
    toggle.addEventListener('click', function() {
      this.classList.toggle('expanded');
      const childList = li.querySelector(':scope > .outline');
      if (childList) {
        childList.style.display = childList.style.display === 'none' ? '' : 'none';
      }
    });
    row.appendChild(toggle);
  } else if (item.check !== undefined) {
    const check = document.createElement('span');
    check.className = 'item-check';
    const box = document.createElement('span');
    box.className = 'item-check-box' + (item.check === 'checked' ? ' checked' : '');
    check.appendChild(box);
    check.addEventListener('click', function() {
      box.classList.toggle('checked');
      const textEl = row.querySelector('.item-text');
      if (textEl) textEl.classList.toggle('completed');
    });
    row.appendChild(check);
  } else {
    const bullet = document.createElement('span');
    bullet.className = 'item-bullet';
    row.appendChild(bullet);
  }

  // Text
  const textEl = document.createElement('span');
  textEl.className = 'item-text' + (item.completed ? ' completed' : '');
  textEl.innerHTML = item.text;

  // Tag
  if (item.tag) {
    const tag = document.createElement('span');
    tag.className = 'tag tag-' + item.tag.type;
    tag.textContent = item.tag.label;
    textEl.appendChild(tag);
  }

  // Keyboard badge
  if (item.kbd) {
    const badge = document.createElement('span');
    badge.className = 'kbd-badge';
    item.kbd.forEach(function(k) {
      const kbd = document.createElement('kbd');
      kbd.textContent = k;
      badge.appendChild(kbd);
    });
    textEl.appendChild(badge);
  }

  row.appendChild(textEl);

  // Count badge for collapsed
  if (item.count) {
    const countEl = document.createElement('span');
    countEl.className = 'item-count';
    countEl.textContent = item.count + ' items';
    row.appendChild(countEl);
  }

  li.appendChild(row);

  // Note
  if (item.note) {
    const noteEl = document.createElement('div');
    noteEl.className = 'item-note';
    noteEl.textContent = item.note;
    li.appendChild(noteEl);
  }

  // Children
  if (item.children && item.children.length > 0) {
    const childList = document.createElement('ul');
    childList.className = 'outline depth-' + depth;
    if (!item.expanded) childList.style.display = 'none';
    item.children.forEach(function(child) {
      childList.appendChild(renderItem(child, depth + 1));
    });
    li.appendChild(childList);
  }

  return li;
}

// Build the outline
var root = document.getElementById('outlineRoot');
outlineData.forEach(function(item, i) {
  var el = renderItem(item, 1);
  el.style.animationDelay = (i * 0.06) + 's';
  root.appendChild(el);
});

// Search overlay
var searchTrigger = document.getElementById('searchTrigger');
var searchOverlay = document.getElementById('searchOverlay');
var searchInput = document.getElementById('searchInput');
var searchResultsEl = document.getElementById('searchResults');

function openSearch() {
  searchOverlay.classList.add('visible');
  searchInput.value = '';
  renderSearchResults('');
  setTimeout(function() { searchInput.focus(); }, 50);
}

function closeSearch() {
  searchOverlay.classList.remove('visible');
}

function renderSearchResults(query) {
  searchResultsEl.innerHTML = '';
  var results = query.length > 0
    ? searchData.filter(function(r) { return r.text.toLowerCase().indexOf(query.toLowerCase()) > -1; })
    : searchData;

  results.forEach(function(r, i) {
    var div = document.createElement('div');
    div.className = 'search-result-item' + (i === 0 ? ' selected' : '');

    var icon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    icon.setAttribute('class', 'sr-icon');
    icon.setAttribute('viewBox', '0 0 24 24');
    icon.setAttribute('fill', 'none');
    icon.setAttribute('stroke', 'currentColor');
    icon.setAttribute('stroke-width', '2');
    var polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    polyline.setAttribute('points', '9 18 15 12 9 6');
    icon.appendChild(polyline);
    div.appendChild(icon);

    var text = document.createElement('span');
    text.className = 'sr-text';
    if (query.length > 0) {
      var idx = r.text.toLowerCase().indexOf(query.toLowerCase());
      if (idx > -1) {
        text.innerHTML = r.text.substring(0, idx) + '<mark>' + r.text.substring(idx, idx + query.length) + '</mark>' + r.text.substring(idx + query.length);
      } else {
        text.textContent = r.text;
      }
    } else {
      text.textContent = r.text;
    }
    div.appendChild(text);

    var path = document.createElement('span');
    path.className = 'sr-path';
    path.textContent = r.path;
    div.appendChild(path);

    searchResultsEl.appendChild(div);
  });
}

searchTrigger.addEventListener('click', openSearch);

searchOverlay.addEventListener('click', function(e) {
  if (e.target === searchOverlay) closeSearch();
});

searchInput.addEventListener('input', function() {
  renderSearchResults(this.value);
});

document.addEventListener('keydown', function(e) {
  if (e.key === '/' && !searchOverlay.classList.contains('visible') && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    openSearch();
  }
  if (e.key === 'Escape' && searchOverlay.classList.contains('visible')) {
    closeSearch();
  }
});
</script>

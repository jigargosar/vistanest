<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VistaNest — Hierarchical Outliner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@300;400;500;600&family=Anybody:wght@700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #08090a;
  --bg-primary: #0d0f11;
  --bg-elevated: #13161a;
  --bg-surface: #1a1e24;
  --bg-hover: #1f242b;
  --bg-active: #252b34;

  --border-subtle: #1e2329;
  --border-default: #2a3139;
  --border-strong: #3a4350;

  --text-primary: #d4dae3;
  --text-secondary: #8a95a5;
  --text-tertiary: #5a6577;
  --text-ghost: #3a4455;

  --accent-green: #3ddc84;
  --accent-green-dim: #2a9d5e;
  --accent-green-glow: rgba(61, 220, 132, 0.12);
  --accent-amber: #f0a830;
  --accent-amber-dim: #b07a20;
  --accent-amber-glow: rgba(240, 168, 48, 0.10);
  --accent-blue: #5ba4f5;
  --accent-red: #e05555;
  --accent-purple: #a78bfa;

  --font-mono: 'JetBrains Mono', 'IBM Plex Mono', monospace;
  --font-display: 'Anybody', sans-serif;

  --rail-width: 20px;
  --indent-size: 24px;
  --item-height: 32px;

  --scanline-opacity: 0.03;
}

html { font-size: 13px; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-weight: 400;
  line-height: 1.5;
  height: 100vh;
  overflow: hidden;
  cursor: default;
}

/* Scanline overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, var(--scanline-opacity)) 2px,
    rgba(0, 0, 0, var(--scanline-opacity)) 4px
  );
}

/* Vignette */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9998;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
}

/* ── Layout ── */
.app {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 48px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-primary);
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-green-dim), transparent);
  opacity: 0.3;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 24px;
  height: 24px;
  position: relative;
}

.logo-mark svg {
  width: 100%;
  height: 100%;
}

.logo-text {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--accent-green), var(--accent-amber));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-center {
  display: flex;
  align-items: center;
  gap: 16px;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.85rem;
  color: var(--text-tertiary);
}

.breadcrumb-item {
  padding: 2px 6px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
}

.breadcrumb-item:hover {
  color: var(--text-secondary);
  background: var(--bg-hover);
}

.breadcrumb-item.current {
  color: var(--text-primary);
}

.breadcrumb-sep {
  color: var(--text-ghost);
  font-size: 0.7rem;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 8px;
  border: 1px solid var(--border-subtle);
  border-radius: 4px;
  background: transparent;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
}

.header-btn:hover {
  color: var(--text-secondary);
  border-color: var(--border-default);
  background: var(--bg-hover);
}

.header-btn kbd {
  font-size: 0.65rem;
  padding: 1px 4px;
  border-radius: 2px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  color: var(--text-ghost);
}

/* ── Main Content ── */
.main {
  display: grid;
  grid-template-columns: 240px 1fr;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  background: var(--bg-primary);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 12px 14px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-title {
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-ghost);
}

.sidebar-add {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border-subtle);
  border-radius: 3px;
  background: transparent;
  color: var(--text-ghost);
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.15s;
}

.sidebar-add:hover {
  color: var(--accent-green);
  border-color: var(--accent-green-dim);
  background: var(--accent-green-glow);
}

.sidebar-lists {
  flex: 1;
  overflow-y: auto;
  padding: 4px 6px;
}

.sidebar-lists::-webkit-scrollbar { width: 4px; }
.sidebar-lists::-webkit-scrollbar-track { background: transparent; }
.sidebar-lists::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 2px; }

.list-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.12s;
  position: relative;
  font-size: 0.85rem;
  color: var(--text-secondary);
}

.list-item:hover { background: var(--bg-hover); }

.list-item.active {
  background: var(--bg-active);
  color: var(--text-primary);
}

.list-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 6px;
  bottom: 6px;
  width: 2px;
  background: var(--accent-green);
  border-radius: 1px;
}

.list-icon {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  flex-shrink: 0;
}

.list-item.active .list-icon { color: var(--accent-green); }

.list-count {
  margin-left: auto;
  font-size: 0.65rem;
  color: var(--text-ghost);
  min-width: 16px;
  text-align: right;
}

.sidebar-section {
  margin-top: 12px;
}

.sidebar-divider {
  height: 1px;
  background: var(--border-subtle);
  margin: 8px 14px;
}

/* ── Outline Area ── */
.outline-container {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-deep);
}

.outline-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-primary);
  min-height: 40px;
}

.outline-title-area {
  display: flex;
  align-items: center;
  gap: 10px;
}

.outline-title {
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text-primary);
}

.outline-meta {
  font-size: 0.7rem;
  color: var(--text-ghost);
  padding: 2px 6px;
  background: var(--bg-surface);
  border-radius: 3px;
}

.toolbar-controls {
  display: flex;
  align-items: center;
  gap: 4px;
}

.tool-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 4px;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.12s;
}

.tool-btn:hover {
  background: var(--bg-hover);
  color: var(--text-secondary);
}

.tool-btn.active {
  background: var(--accent-green-glow);
  color: var(--accent-green);
}

.tool-sep {
  width: 1px;
  height: 16px;
  background: var(--border-subtle);
  margin: 0 4px;
}

/* ── Outline Tree ── */
.outline-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.outline-scroll::-webkit-scrollbar { width: 6px; }
.outline-scroll::-webkit-scrollbar-track { background: transparent; }
.outline-scroll::-webkit-scrollbar-thumb {
  background: var(--border-subtle);
  border-radius: 3px;
}
.outline-scroll::-webkit-scrollbar-thumb:hover { background: var(--border-default); }

.outline-tree {
  padding: 0 12px 0 8px;
  position: relative;
}

/* ── Outline Items ── */
.outline-item {
  position: relative;
  user-select: none;
}

.item-row {
  display: flex;
  align-items: flex-start;
  min-height: var(--item-height);
  padding: 2px 8px 2px 0;
  border-radius: 3px;
  cursor: pointer;
  transition: background 0.08s;
  position: relative;
}

.item-row:hover { background: var(--bg-hover); }

.item-row.focused {
  background: var(--bg-active);
  outline: 1px solid var(--border-default);
  outline-offset: -1px;
}

.item-row.focused::before {
  content: '';
  position: absolute;
  left: 0;
  top: 2px;
  bottom: 2px;
  width: 2px;
  background: var(--accent-green);
  border-radius: 1px;
}

.item-row.editing {
  background: var(--bg-surface);
  outline: 1px solid var(--accent-green-dim);
  outline-offset: -1px;
}

.item-row.editing::before {
  content: '';
  position: absolute;
  left: 0;
  top: 2px;
  bottom: 2px;
  width: 2px;
  background: var(--accent-green);
  border-radius: 1px;
  box-shadow: 0 0 8px var(--accent-green-glow);
}

/* Indent guides */
.item-indent {
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
}

.indent-unit {
  width: var(--indent-size);
  position: relative;
  flex-shrink: 0;
}

.indent-unit::before {
  content: '';
  position: absolute;
  left: 11px;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--border-subtle);
  opacity: 0.5;
}

.indent-unit.guide-active::before {
  background: var(--accent-green-dim);
  opacity: 0.3;
}

/* Bullet / toggle */
.item-bullet-area {
  width: var(--rail-width);
  height: var(--item-height);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
  cursor: pointer;
}

.item-bullet {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-ghost);
  transition: all 0.15s;
}

.item-row:hover .item-bullet { background: var(--text-tertiary); }
.item-row.focused .item-bullet { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green-glow); }

/* Parent bullet (has children) */
.item-bullet.has-children {
  width: 8px;
  height: 8px;
  background: transparent;
  border: 1.5px solid var(--text-ghost);
  position: relative;
}

.item-row:hover .item-bullet.has-children { border-color: var(--text-tertiary); }
.item-row.focused .item-bullet.has-children {
  border-color: var(--accent-green);
  box-shadow: 0 0 6px var(--accent-green-glow);
}

.item-bullet.has-children.collapsed::after {
  content: '';
  position: absolute;
  inset: 2px;
  background: var(--text-ghost);
  border-radius: 50%;
}

.item-row.focused .item-bullet.has-children.collapsed::after {
  background: var(--accent-green);
}

/* Checkbox */
.item-checkbox {
  width: 14px;
  height: 14px;
  border: 1.5px solid var(--border-strong);
  border-radius: 2px;
  margin-right: 8px;
  margin-top: 8px;
  flex-shrink: 0;
  position: relative;
  cursor: pointer;
  transition: all 0.15s;
}

.item-checkbox:hover {
  border-color: var(--accent-green-dim);
}

.item-checkbox.checked {
  background: var(--accent-green-dim);
  border-color: var(--accent-green-dim);
}

.item-checkbox.checked::after {
  content: '';
  position: absolute;
  left: 3px;
  top: 0.5px;
  width: 5px;
  height: 8px;
  border: solid var(--bg-deep);
  border-width: 0 1.5px 1.5px 0;
  transform: rotate(45deg);
}

/* Content */
.item-content {
  flex: 1;
  min-width: 0;
  padding-top: 5px;
  padding-bottom: 5px;
  font-size: 0.9rem;
  line-height: 1.55;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-word;
}

.item-content.completed {
  color: var(--text-ghost);
  text-decoration: line-through;
  text-decoration-color: var(--text-ghost);
}

/* Tags */
.tag {
  display: inline;
  font-size: 0.75rem;
  padding: 1px 5px;
  border-radius: 2px;
  font-weight: 500;
  margin-left: 4px;
  vertical-align: middle;
}

.tag-priority {
  background: rgba(224, 85, 85, 0.15);
  color: var(--accent-red);
  border: 1px solid rgba(224, 85, 85, 0.2);
}

.tag-wip {
  background: var(--accent-amber-glow);
  color: var(--accent-amber);
  border: 1px solid rgba(240, 168, 48, 0.2);
}

.tag-done {
  background: var(--accent-green-glow);
  color: var(--accent-green-dim);
  border: 1px solid rgba(61, 220, 132, 0.15);
}

.tag-label {
  background: rgba(167, 139, 250, 0.1);
  color: var(--accent-purple);
  border: 1px solid rgba(167, 139, 250, 0.15);
}

.tag-ref {
  background: rgba(91, 164, 245, 0.1);
  color: var(--accent-blue);
  border: 1px solid rgba(91, 164, 245, 0.15);
}

/* Notes on items */
.item-note {
  font-size: 0.8rem;
  color: var(--text-tertiary);
  font-style: italic;
  padding-top: 2px;
  padding-left: 0;
}

/* Item meta (right side) */
.item-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
  padding-left: 12px;
  padding-top: 7px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.12s;
}

.item-row:hover .item-meta,
.item-row.focused .item-meta { opacity: 1; }

.meta-badge {
  font-size: 0.65rem;
  color: var(--text-ghost);
  padding: 1px 4px;
  background: var(--bg-surface);
  border-radius: 2px;
  white-space: nowrap;
}

/* Children container */
.item-children {
  position: relative;
}

.item-children.collapsed { display: none; }

/* Collapse count badge */
.collapse-count {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 0.65rem;
  color: var(--text-ghost);
  padding: 0 5px;
  margin-left: 6px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 2px;
  vertical-align: middle;
}

/* ── Status Bar ── */
.statusbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 26px;
  background: var(--bg-primary);
  border-top: 1px solid var(--border-subtle);
  font-size: 0.7rem;
  color: var(--text-ghost);
}

.statusbar-left,
.statusbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent-green);
}

.status-key {
  padding: 0 3px;
  background: var(--bg-surface);
  border-radius: 2px;
  border: 1px solid var(--border-subtle);
  font-size: 0.6rem;
}

/* ── Command Palette ── */
.command-palette-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 1000;
  display: flex;
  justify-content: center;
  padding-top: 15vh;
  animation: fadeIn 0.1s ease-out;
}

.command-palette-overlay.hidden { display: none; }

.command-palette {
  width: 520px;
  max-height: 400px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 1px rgba(61, 220, 132, 0.2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: slideDown 0.15s ease-out;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.cmd-input-area {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-subtle);
  gap: 10px;
}

.cmd-prefix {
  color: var(--accent-green);
  font-size: 1rem;
  font-weight: 600;
}

.cmd-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.9rem;
  caret-color: var(--accent-green);
}

.cmd-input::placeholder { color: var(--text-ghost); }

.cmd-results {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}

.cmd-group-label {
  padding: 6px 10px 4px;
  font-size: 0.65rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-ghost);
}

.cmd-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.08s;
}

.cmd-item:hover { background: var(--bg-hover); }

.cmd-item.selected {
  background: var(--bg-active);
}

.cmd-item-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  font-size: 0.75rem;
  flex-shrink: 0;
}

.cmd-item.selected .cmd-item-icon { color: var(--accent-green); }

.cmd-item-label {
  flex: 1;
  font-size: 0.85rem;
  color: var(--text-secondary);
}

.cmd-item.selected .cmd-item-label { color: var(--text-primary); }

.cmd-item-shortcut {
  font-size: 0.7rem;
  color: var(--text-ghost);
  display: flex;
  gap: 3px;
}

.cmd-item-shortcut kbd {
  padding: 1px 5px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 2px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
}

.cmd-footer {
  padding: 8px 16px;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 0.65rem;
  color: var(--text-ghost);
}

.cmd-footer-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.cmd-footer-item kbd {
  padding: 0 4px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 2px;
  font-family: var(--font-mono);
}

/* ── Help Panel (slide from right) ── */
.help-panel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 340px;
  background: var(--bg-elevated);
  border-left: 1px solid var(--border-default);
  box-shadow: -10px 0 40px rgba(0,0,0,0.3);
  z-index: 900;
  display: flex;
  flex-direction: column;
  transform: translateX(0);
  transition: transform 0.2s ease-out;
}

.help-panel.hidden {
  transform: translateX(100%);
  pointer-events: none;
}

.help-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-subtle);
}

.help-title {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
}

.help-close {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-ghost);
  cursor: pointer;
  border-radius: 3px;
  font-size: 0.8rem;
}

.help-close:hover { background: var(--bg-hover); color: var(--text-secondary); }

.help-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 18px;
}

.help-section {
  margin-bottom: 16px;
}

.help-section-title {
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent-green-dim);
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border-subtle);
}

.help-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 0.8rem;
}

.help-row-label { color: var(--text-secondary); }

.help-row-keys {
  display: flex;
  gap: 3px;
}

.help-row-keys kbd {
  padding: 1px 6px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-tertiary);
}

/* ── Pulse cursor animation ── */
@keyframes cursorBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.editing-cursor {
  display: inline-block;
  width: 1.5px;
  height: 1.1em;
  background: var(--accent-green);
  vertical-align: text-bottom;
  animation: cursorBlink 0.8s ease-in-out infinite;
  box-shadow: 0 0 4px var(--accent-green-glow);
  margin-left: 1px;
}

/* ── Selection highlight ── */
.item-row.selected {
  background: rgba(61, 220, 132, 0.06);
}

.item-row.selected .item-content {
  color: var(--accent-green);
}

/* ── Drag indicator ── */
.drag-indicator {
  position: absolute;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent-green);
  box-shadow: 0 0 8px var(--accent-green-glow);
  pointer-events: none;
  display: none;
}

/* ── Toast notification ── */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 16px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
  border-radius: 6px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  z-index: 2000;
  display: flex;
  align-items: center;
  gap: 8px;
  animation: toastIn 0.2s ease-out;
}

.toast.hidden { display: none; }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.toast-icon { color: var(--accent-green); }

/* ── Noise texture ── */
.noise-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9997;
  opacity: 0.015;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 128px;
}
</style>
</head>
<body>

<div class="noise-overlay"></div>

<div class="app" id="app"></div>

<script>
// ── Data ──
const outlineData = {
  title: "Product Roadmap Q2 2026",
  items: [
    {
      id: 1, text: "Release Planning", expanded: true, checked: false,
      children: [
        {
          id: 2, text: "Finalize v3.2 feature set", expanded: true, checked: false,
          tags: [{ type: "priority", label: "P0" }],
          children: [
            { id: 3, text: "Core editor rewrite — switch to ProseMirror", checked: false, tags: [{ type: "wip", label: "WIP" }], note: "Blocked on schema migration", children: [] },
            { id: 4, text: "Keyboard navigation overhaul", checked: true, tags: [{ type: "done", label: "done" }], children: [] },
            { id: 5, text: "Multi-cursor support", checked: false, tags: [{ type: "label", label: "editor" }], children: [] },
            { id: 6, text: "Collaborative editing — CRDT integration", checked: false, tags: [{ type: "ref", label: "RFC-42" }], children: [] },
          ]
        },
        {
          id: 7, text: "Infrastructure & deployment", expanded: true, checked: false,
          children: [
            { id: 8, text: "Migrate CI/CD to GitHub Actions", checked: true, tags: [{ type: "done", label: "done" }], children: [] },
            { id: 9, text: "Set up staging environment", checked: false, children: [] },
            { id: 10, text: "Configure canary deployments", checked: false, children: [] },
          ]
        },
        { id: 11, text: "Draft release notes template", checked: true, children: [] },
      ]
    },
    {
      id: 12, text: "Design System", expanded: true, checked: false,
      tags: [{ type: "label", label: "design" }],
      children: [
        {
          id: 13, text: "Component library v2", expanded: false, checked: false,
          children: [
            { id: 14, text: "Button variants and states", checked: true, children: [] },
            { id: 15, text: "Form input components", checked: false, children: [] },
            { id: 16, text: "Modal and dialog system", checked: false, children: [] },
            { id: 17, text: "Toast notifications", checked: false, children: [] },
            { id: 18, text: "Data table with virtual scroll", checked: false, children: [] },
          ]
        },
        { id: 19, text: "Dark theme token audit", checked: false, tags: [{ type: "wip", label: "WIP" }], children: [] },
        { id: 20, text: "Accessibility compliance — WCAG 2.2 AA", checked: false, tags: [{ type: "priority", label: "P1" }], children: [] },
      ]
    },
    {
      id: 21, text: "Team & Process", expanded: true, checked: false,
      children: [
        { id: 22, text: "Onboard two new frontend engineers", checked: false, note: "Interviews scheduled for March", children: [] },
        { id: 23, text: "Establish code review guidelines", checked: true, children: [] },
        { id: 24, text: "Set up weekly architecture sync", checked: false, children: [] },
        {
          id: 25, text: "Documentation sprint", expanded: true, checked: false,
          children: [
            { id: 26, text: "API reference docs", checked: false, children: [] },
            { id: 27, text: "Developer onboarding guide", checked: false, tags: [{ type: "wip", label: "WIP" }], children: [] },
            { id: 28, text: "Architecture decision records", checked: true, children: [] },
          ]
        },
      ]
    },
    {
      id: 29, text: "Research & Exploration", expanded: true, checked: false,
      children: [
        { id: 30, text: "Evaluate WebAssembly for compute-heavy modules", checked: false, tags: [{ type: "ref", label: "spike" }], children: [] },
        { id: 31, text: "Prototype offline-first sync engine", checked: false, children: [] },
        { id: 32, text: "Investigate edge rendering strategies", checked: false, children: [] },
      ]
    },
  ]
};

const sidebarLists = [
  { name: "Product Roadmap Q2 2026", icon: "\u25c8", count: 32, active: true },
  { name: "Sprint Backlog", icon: "\u25cb", count: 18, active: false },
  { name: "Architecture Notes", icon: "\u25cb", count: 7, active: false },
  { name: "Meeting Notes", icon: "\u25cb", count: 24, active: false },
  { name: "Personal Tasks", icon: "\u25cb", count: 11, active: false },
];

const sidebarShared = [
  { name: "Team OKRs", icon: "\u25cb", count: 9, active: false },
  { name: "Design Specs", icon: "\u25cb", count: 15, active: false },
];

const commandItems = [
  { group: "Actions", items: [
    { icon: "\u2295", label: "New item below", keys: ["Enter"] },
    { icon: "\u2192", label: "Indent item", keys: ["Tab"] },
    { icon: "\u2190", label: "Outdent item", keys: ["Shift", "Tab"] },
    { icon: "\u2714", label: "Toggle checkbox", keys: ["Ctrl", "Enter"] },
  ]},
  { group: "Navigation", items: [
    { icon: "\u2191", label: "Move focus up", keys: ["\u2191"] },
    { icon: "\u2193", label: "Move focus down", keys: ["\u2193"] },
    { icon: "\u25b6", label: "Expand / Collapse", keys: ["Ctrl", "."] },
    { icon: "\u21b5", label: "Zoom into item", keys: ["Ctrl", "\u2192"] },
  ]},
  { group: "Organization", items: [
    { icon: "\u2b06", label: "Move item up", keys: ["Alt", "\u2191"] },
    { icon: "\u2b07", label: "Move item down", keys: ["Alt", "\u2193"] },
    { icon: "#", label: "Add tag", keys: ["#"] },
    { icon: "\u2702", label: "Delete item", keys: ["Ctrl", "Del"] },
  ]},
];

const helpSections = [
  { title: "Navigation", rows: [
    { label: "Move up / down", keys: ["j / k"] },
    { label: "Parent item", keys: ["h"] },
    { label: "First child", keys: ["l"] },
    { label: "Top / Bottom", keys: ["g g / G"] },
    { label: "Zoom in / out", keys: ["Ctrl \u2192 / \u2190"] },
  ]},
  { title: "Editing", rows: [
    { label: "Start editing", keys: ["e / i"] },
    { label: "New sibling below", keys: ["Enter"] },
    { label: "New sibling above", keys: ["Shift Enter"] },
    { label: "New child", keys: ["Ctrl Enter"] },
    { label: "Delete item", keys: ["d d"] },
    { label: "Copy / Paste", keys: ["y y / p"] },
  ]},
  { title: "Structure", rows: [
    { label: "Indent", keys: ["Tab"] },
    { label: "Outdent", keys: ["Shift Tab"] },
    { label: "Move up", keys: ["Alt \u2191"] },
    { label: "Move down", keys: ["Alt \u2193"] },
    { label: "Toggle fold", keys: ["Space"] },
    { label: "Fold all", keys: ["z M"] },
    { label: "Unfold all", keys: ["z R"] },
  ]},
  { title: "Selection", rows: [
    { label: "Select item", keys: ["x"] },
    { label: "Select range", keys: ["Shift \u2191\u2193"] },
    { label: "Select all", keys: ["Ctrl a"] },
    { label: "Toggle checkbox", keys: ["c"] },
  ]},
  { title: "Global", rows: [
    { label: "Command palette", keys: ["Ctrl k"] },
    { label: "Search", keys: ["/"] },
    { label: "Help", keys: ["?"] },
    { label: "Undo / Redo", keys: ["u / Ctrl r"] },
  ]},
];

// ── State ──
let focusedId = 3;
let editingId = 3;
let showCommandPalette = false;
let showHelp = false;

// ── SVG Icons ──
const nestSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
  <path d="M3 6h4M3 12h4M3 18h4M11 6h10M11 12h10M11 18h10" stroke-linecap="round"/>
  <path d="M7 6v6" stroke="currentColor" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M7 12v6" stroke="currentColor" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
</svg>`;

// ── Render Functions ──

function renderTags(tags) {
  if (!tags || tags.length === 0) return '';
  return tags.map(function(t) {
    return '<span class="tag tag-' + t.type + '">' + t.label + '</span>';
  }).join('');
}

function countChildren(item) {
  if (!item.children) return 0;
  let count = item.children.length;
  item.children.forEach(function(c) { count += countChildren(c); });
  return count;
}

function renderItem(item, depth) {
  const isFocused = item.id === focusedId;
  const isEditing = item.id === editingId;
  const hasChildren = item.children && item.children.length > 0;
  const isExpanded = item.expanded !== false;
  const isChecked = item.checked === true;

  let rowClasses = 'item-row';
  if (isFocused) rowClasses += ' focused';
  if (isEditing) rowClasses += ' editing';

  // indent guides
  let indentHTML = '';
  for (let i = 0; i < depth; i++) {
    const activeGuide = isFocused ? ' guide-active' : '';
    indentHTML += '<div class="indent-unit' + activeGuide + '"></div>';
  }

  // bullet
  let bulletClasses = 'item-bullet';
  if (hasChildren) {
    bulletClasses += ' has-children';
    if (!isExpanded) bulletClasses += ' collapsed';
  }

  // checkbox
  let checkboxHTML = '<div class="item-checkbox' + (isChecked ? ' checked' : '') + '"></div>';

  // content
  let contentClasses = 'item-content';
  if (isChecked) contentClasses += ' completed';

  let contentInner = item.text;
  if (isEditing) {
    contentInner = item.text + '<span class="editing-cursor"></span>';
  }
  contentInner += renderTags(item.tags);

  if (hasChildren && !isExpanded) {
    const childCount = countChildren(item);
    contentInner += '<span class="collapse-count">' + childCount + ' hidden</span>';
  }

  let noteHTML = '';
  if (item.note) {
    noteHTML = '<div class="item-note">' + item.note + '</div>';
  }

  // meta
  let metaHTML = '<div class="item-meta">';
  if (isEditing) {
    metaHTML += '<span class="meta-badge">EDIT</span>';
  }
  metaHTML += '</div>';

  let childrenHTML = '';
  if (hasChildren) {
    const childrenClasses = 'item-children' + (isExpanded ? '' : ' collapsed');
    let kids = '';
    item.children.forEach(function(child) {
      kids += renderItem(child, depth + 1);
    });
    childrenHTML = '<div class="' + childrenClasses + '">' + kids + '</div>';
  }

  return '<div class="outline-item">' +
    '<div class="' + rowClasses + '">' +
      '<div class="item-indent">' + indentHTML + '</div>' +
      '<div class="item-bullet-area"><div class="' + bulletClasses + '"></div></div>' +
      checkboxHTML +
      '<div class="' + contentClasses + '">' + contentInner + noteHTML + '</div>' +
      metaHTML +
    '</div>' +
    childrenHTML +
  '</div>';
}

function renderOutlineTree() {
  let html = '';
  outlineData.items.forEach(function(item) {
    html += renderItem(item, 0);
  });
  return html;
}

function renderSidebarItems(items) {
  return items.map(function(item) {
    const cls = 'list-item' + (item.active ? ' active' : '');
    const iconColor = item.active ? 'var(--accent-green)' : '';
    return '<div class="' + cls + '">' +
      '<span class="list-icon" style="color: ' + iconColor + '">' + item.icon + '</span>' +
      '<span>' + item.name + '</span>' +
      '<span class="list-count">' + item.count + '</span>' +
    '</div>';
  }).join('');
}

function renderCommandPalette() {
  if (!showCommandPalette) return '<div class="command-palette-overlay hidden"></div>';

  let groupsHTML = '';
  commandItems.forEach(function(group) {
    groupsHTML += '<div class="cmd-group-label">' + group.group + '</div>';
    group.items.forEach(function(item, idx) {
      const sel = (group.group === 'Actions' && idx === 0) ? ' selected' : '';
      const keysHTML = item.keys.map(function(k) { return '<kbd>' + k + '</kbd>'; }).join('');
      groupsHTML +=
        '<div class="cmd-item' + sel + '">' +
          '<span class="cmd-item-icon">' + item.icon + '</span>' +
          '<span class="cmd-item-label">' + item.label + '</span>' +
          '<span class="cmd-item-shortcut">' + keysHTML + '</span>' +
        '</div>';
    });
  });

  return '<div class="command-palette-overlay">' +
    '<div class="command-palette">' +
      '<div class="cmd-input-area">' +
        '<span class="cmd-prefix">&gt;</span>' +
        '<input class="cmd-input" placeholder="Type a command..." autofocus />' +
      '</div>' +
      '<div class="cmd-results">' + groupsHTML + '</div>' +
      '<div class="cmd-footer">' +
        '<span class="cmd-footer-item"><kbd>\u2191\u2193</kbd> navigate</span>' +
        '<span class="cmd-footer-item"><kbd>\u21b5</kbd> select</span>' +
        '<span class="cmd-footer-item"><kbd>esc</kbd> close</span>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderHelpPanel() {
  let sectionsHTML = '';
  helpSections.forEach(function(section) {
    let rowsHTML = '';
    section.rows.forEach(function(row) {
      const keysHTML = row.keys.map(function(k) { return '<kbd>' + k + '</kbd>'; }).join(' ');
      rowsHTML += '<div class="help-row">' +
        '<span class="help-row-label">' + row.label + '</span>' +
        '<span class="help-row-keys">' + keysHTML + '</span>' +
      '</div>';
    });
    sectionsHTML += '<div class="help-section">' +
      '<div class="help-section-title">' + section.title + '</div>' +
      rowsHTML +
    '</div>';
  });

  return '<div class="help-panel' + (showHelp ? '' : ' hidden') + '">' +
    '<div class="help-header">' +
      '<span class="help-title">Keyboard Shortcuts</span>' +
      '<button class="help-close" onclick="toggleHelp()">\u2715</button>' +
    '</div>' +
    '<div class="help-body">' + sectionsHTML + '</div>' +
  '</div>';
}

function renderToast() {
  return '<div class="toast">' +
    '<span class="toast-icon">\u2714</span>' +
    '<span>Item checked \u2014 <strong>Keyboard navigation overhaul</strong></span>' +
    '<span style="color: var(--text-ghost); margin-left: 8px;">Ctrl+Z to undo</span>' +
  '</div>';
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML =
    // Header
    '<div class="header">' +
      '<div class="logo">' +
        '<div class="logo-mark">' + nestSVG + '</div>' +
        '<span class="logo-text">VistaNest</span>' +
      '</div>' +
      '<div class="header-center">' +
        '<div class="breadcrumb">' +
          '<span class="breadcrumb-item">Lists</span>' +
          '<span class="breadcrumb-sep">/</span>' +
          '<span class="breadcrumb-item current">Product Roadmap Q2 2026</span>' +
        '</div>' +
      '</div>' +
      '<div class="header-actions">' +
        '<div class="header-btn" onclick="toggleCommandPalette()"><kbd>Ctrl K</kbd> Commands</div>' +
        '<div class="header-btn" onclick="toggleHelp()"><kbd>?</kbd> Help</div>' +
      '</div>' +
    '</div>' +

    // Main
    '<div class="main">' +
      // Sidebar
      '<div class="sidebar">' +
        '<div class="sidebar-header">' +
          '<span class="sidebar-title">My Lists</span>' +
          '<button class="sidebar-add">+</button>' +
        '</div>' +
        '<div class="sidebar-lists">' +
          renderSidebarItems(sidebarLists) +
          '<div class="sidebar-divider"></div>' +
          '<div class="sidebar-header" style="padding-top:4px">' +
            '<span class="sidebar-title">Shared</span>' +
          '</div>' +
          renderSidebarItems(sidebarShared) +
        '</div>' +
      '</div>' +

      // Outline
      '<div class="outline-container">' +
        '<div class="outline-toolbar">' +
          '<div class="outline-title-area">' +
            '<span class="outline-title">' + outlineData.title + '</span>' +
            '<span class="outline-meta">32 items \u00b7 5 done</span>' +
          '</div>' +
          '<div class="toolbar-controls">' +
            '<button class="tool-btn" title="Expand all">\u2630</button>' +
            '<button class="tool-btn" title="Collapse all">\u2261</button>' +
            '<span class="tool-sep"></span>' +
            '<button class="tool-btn active" title="Checkboxes">\u2611</button>' +
            '<button class="tool-btn" title="Notes">\u2637</button>' +
            '<span class="tool-sep"></span>' +
            '<button class="tool-btn" title="Filter">\u2a0d</button>' +
            '<button class="tool-btn" title="Sort">\u21c5</button>' +
          '</div>' +
        '</div>' +
        '<div class="outline-scroll">' +
          '<div class="outline-tree">' +
            renderOutlineTree() +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    // Status bar
    '<div class="statusbar">' +
      '<div class="statusbar-left">' +
        '<span class="status-item"><span class="status-dot"></span> NORMAL</span>' +
        '<span class="status-item">L3 \u00b7 C12</span>' +
        '<span class="status-item">Depth: 2</span>' +
      '</div>' +
      '<div class="statusbar-right">' +
        '<span class="status-item"><span class="status-key">?</span> help</span>' +
        '<span class="status-item"><span class="status-key">Ctrl K</span> commands</span>' +
        '<span class="status-item">Saved 2s ago</span>' +
      '</div>' +
    '</div>' +

    renderCommandPalette() +
    renderHelpPanel() +
    renderToast();
}

function toggleCommandPalette() {
  showCommandPalette = !showCommandPalette;
  render();
  if (showCommandPalette) {
    const input = document.querySelector('.cmd-input');
    if (input) input.focus();
  }
}

function toggleHelp() {
  showHelp = !showHelp;
  render();
}

// Keyboard handler
document.addEventListener('keydown', function(e) {
  if (e.key === 'k' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    toggleCommandPalette();
  }
  if (e.key === 'Escape') {
    if (showCommandPalette) { showCommandPalette = false; render(); }
    if (showHelp) { showHelp = false; render(); }
  }
  if (e.key === '?' && !showCommandPalette && !e.ctrlKey && !e.metaKey) {
    const active = document.activeElement;
    if (!active || active.tagName !== 'INPUT') {
      e.preventDefault();
      toggleHelp();
    }
  }
});

// Click outside command palette
document.addEventListener('click', function(e) {
  if (showCommandPalette && e.target.classList.contains('command-palette-overlay')) {
    showCommandPalette = false;
    render();
  }
});

// Initial render
render();

// Auto-hide toast after delay
setTimeout(function() {
  const toast = document.querySelector('.toast');
  if (toast) {
    toast.style.transition = 'opacity 0.3s';
    toast.style.opacity = '0';
    setTimeout(function() { toast.style.display = 'none'; }, 300);
  }
}, 4000);
</script>

</body>
</html>
